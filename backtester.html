<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart Kripto (ECharts) dengan Fitur Trade Journal</title>
    <!-- 1. Impor library Apache ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            padding: 0; margin: 0; background-color: #131722;
            color: #D9D9D9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; /* Mencegah scroll pada body */
        }
        #app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #toolbar {
            display: flex; align-items: center; padding: 8px 16px;
            background-color: #1e222d; border-bottom: 1px solid #2A2E39; gap: 20px; flex-shrink: 0;
        }
        #search-container input {
            background-color: #2A2E39; color: #D9D9D9; border: 1px solid #485158;
            padding: 8px 12px; border-radius: 4px; outline: none;
        }
        #search-container input:focus { border-color: #589ee9; }
        #timeframe-controls button, #search-container button {
            background-color: transparent; color: #D9D9D9; border: none;
            padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 14px;
        }
        #timeframe-controls button:hover, #search-container button:hover { background-color: #2A2E39; }
        #timeframe-controls button.active { background-color: #589ee9; color: white; }
        #chart-container { flex-grow: 1; position: relative; }
        #loading-indicator {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background-color: rgba(40, 40, 40, 0.9); color: white;
            padding: 8px 15px; border-radius: 5px; display: none; z-index: 1000; font-size: 14px;
        }
        #selection-indicator { /* --- [BARU] --- */
            position: absolute; top: 10px; left: 10px;
            background-color: #589ee9; color: white;
            padding: 8px 15px; border-radius: 5px; display: none; z-index: 1000; font-size: 14px;
        }

        /* --- [BARU] Styling untuk UI Trade --- */
        #trade-ui-container { position: fixed; top: 70px; right: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        #trade-controls { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 10px; }
        .trade-button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .long-button { background-color: #26a69a; color: white; }
        .short-button { background-color: #ef5350; color: white; }
        .settings-button { background-color: #424957; color: white; }
        .json-button { background-color: #589ee9; color: white; }
        .trade-button:hover { opacity: 0.9; }

        /* --- [BARU] Styling untuk Modal --- */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); z-index: 1999; display: none; justify-content: center; align-items: center;}
        #settings-modal { background-color: #1e222d; padding: 25px; border-radius: 8px; width: 300px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        #settings-modal h3 { margin-top: 0; border-bottom: 1px solid #2A2E39; padding-bottom: 10px;}
        .modal-field { margin-bottom: 15px; }
        .modal-field label { display: block; margin-bottom: 5px; font-size: 14px; }
        .modal-field input { width: 90%; background-color: #2A2E39; color: #D9D9D9; border: 1px solid #485158; padding: 8px; border-radius: 4px; }
        .modal-actions { text-align: right; margin-top: 20px;}
    </style>
</head>
<body>
    <div id="app-container">
        <div id="toolbar">
            <div id="search-container">
                <input type="text" id="search-input" placeholder="Contoh: ETHUSDT" value="BTCUSDT">
                <button id="search-button">Cari</button>
            </div>
            <div id="timeframe-controls">
                <button data-interval="5">5m</button>
                <button data-interval="15">15m</button>
                <button data-interval="60" class="active">1H</button>
                <button data-interval="240">4H</button>
                <button data-interval="D">1D</button>
            </div>
        </div>
        <div id="chart-container"></div>
        <div id="loading-indicator">Memuat data...</div>
        <div id="selection-indicator"></div> <!-- [BARU] Indikator candle terpilih -->
    </div>

    <!-- --- [BARU] Elemen UI untuk Trading --- -->
    <div id="trade-ui-container">
        <button id="settings-btn" class="trade-button settings-button">⚙️ Pengaturan</button>
        <button id="download-json-btn" class="trade-button json-button">Download JSON</button>
    </div>

    <div id="trade-controls">
        <button id="long-btn" class="trade-button long-button">LONG</button>
        <button id="short-btn" class="trade-button short-button">SHORT</button>
    </div>

    <!-- --- [BARU] Modal untuk Pengaturan TP/SL --- -->
    <div id="modal-overlay">
        <div id="settings-modal">
            <h3>Pengaturan TP/SL</h3>
            <div class="modal-field">
                <label for="tp-input">Take Profit (%)</label>
                <input type="number" id="tp-input" step="0.1" value="1.0">
            </div>
            <div class="modal-field">
                <label for="sl-input">Stop Loss (%)</label>
                <input type="number" id="sl-input" step="0.1" value="0.5">
            </div>
            <div class="modal-actions">
                <button id="save-settings-btn" class="trade-button json-button">Simpan</button>
                <button id="close-modal-btn" class="trade-button settings-button">Batal</button>
            </div>
        </div>
    </div>


    <script>
        // --- State Aplikasi ---
        let currentSymbol = 'BTCUSDT';
        let currentInterval = '60';
        const LIMIT_PER_FETCH = 200;
        let chartInstance = null;
        let isLoading = false;
        let allCandleData = []; // Menyimpan data candle [open, close, low, high]
        let allTimestamps = []; // Menyimpan data timestamp/tanggal
        let ema9Data = [];
        let ema50Data = []; // --- [BARU] ---
        let ema100Data = []; // --- [BARU] ---

        // --- [BARU] State untuk Fitur Trading ---
        let tradeHistory = [];
        let selectedCandleIndex = null;
        let tradeSettings = {
            tp_percent: 1.0,
            sl_percent: 0.5
        };

        // --- Referensi Elemen DOM ---
        const chartContainer = document.getElementById('chart-container');
        const loadingIndicator = document.getElementById('loading-indicator');
        const searchInput = document.getElementById('search-input');
        const searchButton = document.getElementById('search-button');
        const timeframeButtons = document.querySelectorAll('#timeframe-controls button');
        // --- [BARU] Referensi Elemen DOM Baru ---
        const selectionIndicator = document.getElementById('selection-indicator');
        const longBtn = document.getElementById('long-btn');
        const shortBtn = document.getElementById('short-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const downloadJsonBtn = document.getElementById('download-json-btn');
        const modalOverlay = document.getElementById('modal-overlay');
        const saveSettingsBtn = document.getElementById('save-settings-btn');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const tpInput = document.getElementById('tp-input');
        const slInput = document.getElementById('sl-input');

        function calculateEMA(closePrices, period) {
            if (closePrices.length < period) return new Array(closePrices.length).fill(null);

            const k = 2 / (period + 1);
            let emaArray = [];
            
            let sum = 0;
            for (let i = 0; i < period; i++) {
                sum += closePrices[i];
            }
            let prevEma = sum / period;

            for (let i = 0; i < period - 1; i++) {
                emaArray.push(null);
            }
            emaArray.push(prevEma);

            for (let i = period; i < closePrices.length; i++) {
                const currentEma = (closePrices[i] * k) + (prevEma * (1 - k));
                emaArray.push(currentEma);
                prevEma = currentEma;
            }
            return emaArray;
        }
        
        function calculateCandleSolidity(candle) {
            const [open, close, low, high] = candle;
            const range = high - low;
            if (range === 0) {
                return 1;
            }
            return Math.abs(close - open) / range;
        }

        function getCandleDirection(candle) {
            const [open, close] = candle;
            return close >= open ? "UP" : "DOWN";
        }
        
        async function fetchBybitData(symbol, interval, limit, endTime) {
            let url = `https://api.bybit.com/v5/market/kline?category=spot&symbol=${symbol}&interval=${interval}&limit=${limit}`;
            if (endTime) url += `&end=${endTime}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                const data = await response.json();
                if (data.retCode !== 0) throw new Error(`API Error: ${data.retMsg}`);
                
                const candles = data.result.list.map(c => [
                    parseFloat(c[1]), // open
                    parseFloat(c[4]), // close
                    parseFloat(c[3]), // low
                    parseFloat(c[2])  // high
                ]);
                
                const timestamps = data.result.list.map(c => {
                    const d = new Date(parseInt(c[0]));
                    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                });
                
                return { candles: candles.reverse(), timestamps: timestamps.reverse() };
            } catch (error) {
                console.error("Gagal mengambil data:", error);
                alert(`Gagal memuat data untuk ${symbol}. Periksa nama simbol dan koneksi Anda.`);
                return { candles: [], timestamps: [] };
            }
        }

        function setChartOption() {
            chartInstance.setOption({
                backgroundColor: '#131722',
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' }
                },
                grid: { left: '3%', right: '5%', bottom: '15%', containLabel: true },
                xAxis: {
                    type: 'category',
                    data: allTimestamps,
                    axisLine: { lineStyle: { color: '#8392A5' } }
                },
                yAxis: {
                    scale: true,
                    axisLine: { lineStyle: { color: '#8392A5' } },
                    splitLine: { lineStyle: { color: '#2A2E39' } }
                },
                dataZoom: [
                    { type: 'inside', start: 50, end: 100 },
                    { show: true, type: 'slider', top: '90%', start: 50, end: 100 }
                ],
                series: [{
                    type: 'candlestick',
                    name: currentSymbol,
                    data: allCandleData,
                    itemStyle: {
                        color: '#26A69A', color0: '#EF5350',
                        borderColor: '#26A69A', borderColor0: '#EF5350'
                    }
                },
                {
                    name: 'EMA(9)', type: 'line', data: ema9Data, smooth: true,
                    showSymbol: false, lineStyle: { color: '#f6bf54', width: 1.5 }
                },
                {
                    name: 'EMA(50)', type: 'line', data: ema50Data, smooth: true,
                    showSymbol: false, lineStyle: { color: '#589ee9', width: 1.5 }
                },
                {
                    name: 'EMA(100)', type: 'line', data: ema100Data, smooth: true,
                    showSymbol: false, lineStyle: { color: '#d9d9d9', width: 1.5, type: 'dashed' }
                }]
            }, { notMerge: true });
        }
        
        async function reloadChart() {
            if (isLoading) return;
            isLoading = true;
            loadingIndicator.textContent = "Memuat data...";
            loadingIndicator.style.display = 'block';

            const { candles, timestamps } = await fetchBybitData(currentSymbol, currentInterval, LIMIT_PER_FETCH);
            allCandleData = candles;
            allTimestamps = timestamps;
            
            const closePrices = allCandleData.map(d => d[1]);
            ema9Data = calculateEMA(closePrices, 9);
            ema50Data = calculateEMA(closePrices, 50);
            ema100Data = calculateEMA(closePrices, 100);

            setChartOption();
            
            loadingIndicator.style.display = 'none';
            isLoading = false;
        }

        async function loadMoreData() {
            if (isLoading || allTimestamps.length === 0) return;
            isLoading = true;
            loadingIndicator.textContent = "Memuat data historis...";
            loadingIndicator.style.display = 'block';

            const oldestTimestampMs = Date.parse(allTimestamps[0].replace(' ', 'T') + 'Z') - (60 * 1000);

            const { candles, timestamps } = await fetchBybitData(currentSymbol, currentInterval, LIMIT_PER_FETCH, oldestTimestampMs);
            
            if (candles.length > 0) {
                allCandleData = [...candles, ...allCandleData];
                allTimestamps = [...timestamps, ...allTimestamps];
                
                const closePrices = allCandleData.map(d => d[1]);
                ema9Data = calculateEMA(closePrices, 9);
                ema50Data = calculateEMA(closePrices, 50);
                ema100Data = calculateEMA(closePrices, 100);

                setChartOption();
            } else {
                console.log("Tidak ada data historis lebih lanjut.");
            }

            loadingIndicator.style.display = 'none';
            isLoading = false;
        }
        
        function handleChartClick(params) {
            if (params.componentType === 'series' && params.seriesType === 'candlestick') {
                selectedCandleIndex = params.dataIndex;
                const selectedCandle = allCandleData[selectedCandleIndex];
                selectionIndicator.textContent = `Candle Terpilih: ${allTimestamps[selectedCandleIndex]} | Close: ${selectedCandle[1]}`;
                selectionIndicator.style.display = 'block';
            }
        }
        
        // ======================================================================
        //          SATU-SATUNYA FUNGSI YANG DIUBAH ADA DI BAWAH INI
        // ======================================================================
        /**
         * [PERBAIKAN] Membuat dan menyimpan data trade baru dengan kalkulasi P/L
         */
        function enterTrade(tradeType) {
            if (selectedCandleIndex === null) {
                alert("Silakan klik sebuah candle di chart terlebih dahulu!");
                return;
            }

            const LOOKBACK_PERIOD = 15;
            if (selectedCandleIndex < LOOKBACK_PERIOD) {
                alert(`Tidak cukup data historis. Perlu setidaknya ${LOOKBACK_PERIOD} candle sebelum candle terpilih.`);
                return;
            }

            const entryCandle = allCandleData[selectedCandleIndex];
            const prevCandle = allCandleData[selectedCandleIndex - 1];
            
            // --- [DIUBAH] Kalkulasi Exit Price dan P/L ---
            const entryPrice = entryCandle[1];
            let exitPrice;
            let pl_percent;

            // Ambil persentase TP dari pengaturan (misal: 1.0 untuk 1%)
            const tp_decimal = tradeSettings.tp_percent / 100;

            if (tradeType === 'LONG') {
                exitPrice = entryPrice * (1 + tp_decimal);
                pl_percent = ((exitPrice - entryPrice) / entryPrice) * 100;
            } else { // SHORT
                exitPrice = entryPrice * (1 - tp_decimal);
                pl_percent = ((entryPrice - exitPrice) / entryPrice) * 100;
            }
            // --- Akhir Perubahan ---

            const snapshotCandles = allCandleData.slice(selectedCandleIndex - LOOKBACK_PERIOD, selectedCandleIndex);
            const snapshotEma9 = ema9Data.slice(selectedCandleIndex - LOOKBACK_PERIOD, selectedCandleIndex);
            
            const entrySnapshot = {
                ema9_current: ema9Data[selectedCandleIndex],
                ema9_prev: ema9Data[selectedCandleIndex - 1],
                ema50: ema50Data[selectedCandleIndex],
                ema100: ema100Data[selectedCandleIndex],
                current_candle_close: entryCandle[1],
                prev_candle_close: prevCandle[1],
                bias: entryCandle[1] > ema50Data[selectedCandleIndex] ? "BULLISH" : "BEARISH",
                pre_entry_candle_solidity: snapshotCandles.map(c => calculateCandleSolidity(c)),
                pre_entry_candle_direction: snapshotCandles.map(c => getCandleDirection(c)),
                details: {
                    candles: snapshotCandles.map(c => ({ open: c[0], high: c[3], low: c[2], close: c[1] })),
                    ema9: snapshotEma9
                },
                funding_rate: 0.0
            };

            const newTrade = {
                id: Date.now(),
                instrumentId: `${currentSymbol}`,
                type: tradeType,
                entryTimestamp: new Date().toISOString(),
                entryPrice: entryPrice, // --- [DIUBAH] Menggunakan variabel baru
                entryReason: "Manual Entry",
                status: "CLOSED",
                exitPrice: exitPrice, // --- [DIUBAH] Harga keluar berdasarkan TP
                pl_percent: pl_percent, // --- [DIUBAH] P/L yang sudah dihitung
                entry_snapshot: entrySnapshot,
                is_real: false,
                quantity: 0.0,
                exitTimestamp: new Date(Date.now() + 1000).toISOString() // Tambah 1 detik agar beda
            };

            tradeHistory.push(newTrade);
            alert(`Trade ${tradeType} untuk ${currentSymbol} pada harga ${newTrade.entryPrice} berhasil dicatat! Total trade: ${tradeHistory.length}`);
            
            selectedCandleIndex = null;
            selectionIndicator.style.display = 'none';
        }

        function generateAndDownloadJson() {
            if (tradeHistory.length === 0) {
                alert("Tidak ada data trade untuk di-download.");
                return;
            }

            const jsonString = JSON.stringify(tradeHistory, null, 4);
            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            a.href = url;
            a.download = `trade_journal_${currentSymbol}_${new Date().getTime()}.json`;
            document.body.appendChild(a);
a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function init() {
            chartInstance = echarts.init(chartContainer);

            chartInstance.on('datazoom', (params) => {
                const startPercent = params.batch ? params.batch[0].start : params.start;
                if (startPercent < 1) { // Lebih sensitif
                    loadMoreData();
                }
            });
            
            chartInstance.on('click', handleChartClick);

            const performSearch = () => {
                const newSymbol = searchInput.value.trim().toUpperCase();
                if (newSymbol && newSymbol !== currentSymbol) {
                    currentSymbol = newSymbol;
                    tradeHistory = [];
                    reloadChart();
                }
            };
            searchButton.addEventListener('click', performSearch);
            searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') performSearch(); });

            timeframeButtons.forEach(button => {
                button.addEventListener('click', () => {
                    timeframeButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                    const newInterval = button.getAttribute('data-interval');
                    if (newInterval !== currentInterval) {
                        currentInterval = newInterval;
                        reloadChart();
                    }
                });
            });

            window.addEventListener('resize', () => {
                if (chartInstance) chartInstance.resize();
            });

            longBtn.addEventListener('click', () => enterTrade('LONG'));
            shortBtn.addEventListener('click', () => enterTrade('SHORT'));
            downloadJsonBtn.addEventListener('click', generateAndDownloadJson);
            
            settingsBtn.addEventListener('click', () => {
                tpInput.value = tradeSettings.tp_percent;
                slInput.value = tradeSettings.sl_percent;
                modalOverlay.style.display = 'flex';
            });
            closeModalBtn.addEventListener('click', () => {
                modalOverlay.style.display = 'none';
            });
            saveSettingsBtn.addEventListener('click', () => {
                tradeSettings.tp_percent = parseFloat(tpInput.value);
                tradeSettings.sl_percent = parseFloat(slInput.value);
                alert(`Pengaturan disimpan: TP ${tradeSettings.tp_percent}%, SL ${tradeSettings.sl_percent}%`);
                modalOverlay.style.display = 'none';
            });

            reloadChart();
        }

        init();
    </script>
</body>
</html>
